name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - run: go version

      - name: Vet
        run: go vet ./...

      - name: Lint (complexity)
        run: |
          go install github.com/uudashr/gocognit/cmd/gocognit@latest
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          echo "=== Cognitive complexity (gocognit) — max 15 ==="
          find . -type f -name '*.go' -not -path './vendor/*' -not -path './.goa/*' -print0 | xargs -0 gocognit -over 15 || true
          echo "=== Cyclomatic complexity (gocyclo) — max 12 ==="
          find . -type f -name '*.go' -not -path './vendor/*' -not -path './.goa/*' -print0 | xargs -0 gocyclo -over 12 || true

      - name: Test
        run: go test -count=1 -race -cover -timeout 5m ./...

  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - label: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - label: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - label: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - label: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o "goa-${{ matrix.label }}${{ matrix.ext }}" ./cmd/goa/

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: goa-${{ matrix.label }}
          path: goa-${{ matrix.label }}${{ matrix.ext }}
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "goa-${{ matrix.label }}${{ matrix.ext }}" \
            --clobber
