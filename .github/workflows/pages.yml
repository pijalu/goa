name: pages

# Deploys the project landing page (web/) to GitHub Pages.
# The landing page source (web/index.html) and assets are committed; the
# documentation pages are generated at build time from docs/*.md by the
# cmd/webbuild tool (`make web-build`). Repo Settings → Pages → Source must
# be set to "GitHub Actions" (one-time manual setting; see README).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docs/**'
      - 'cmd/webbuild/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Build site (render docs)
        run: make web-build
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
